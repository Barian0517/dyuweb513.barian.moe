<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潮玩香港 - 文字旅行</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1>文字旅行</h1>
            <p>
                在香港旅程結束後，除去全身的酸痛，<br>
                剩下的就是一張張的相片與滿滿回憶。<br>
                其中發生了很多的第一次：<br>
                從台中出發坐了小小又抖很大力的飛機、走了很多路、體驗特有的叮叮電車、<br>
                吃了很多有名的餐廳、看了書展畫展、遇到颱風...等<br>
                這裡透過文字，記錄旅程中的港島印象，與大家分享當下心情。
            </p>
        </header>

        <main class="gallery">
            <div class="card">
                <a href="blog-1.html">
                    <img src="images/blog1.jpg" alt="摩天，你的名字是大樓" class="card-img"/>
                    <div class="card-content">
                        <div class="card-title">摩天，你的名字是大樓</div>
                    </div>
                </a>
            </div>

            <div class="card">
                <a href="blog-2.html">
                    <img src="images/blog2.jpg" alt="人車併行的香港春秧街" class="card-img"/>
                    <div class="card-content">
                        <div class="card-title">人車併行的香港春秧街</div>
                    </div>
                </a>
            </div>

            <div class="card">
                <a href="blog-3.html">
                    <img src="images/blog3.jpg" alt="舒適倘佯香港島的速度-叮叮車" class="card-img"/>
                    <div class="card-content">
                        <div class="card-title">舒適倘佯香港島的速度-叮叮車</div>
                    </div>
                </a>
            </div>
        </main>
    </div>
</body>
</html>
